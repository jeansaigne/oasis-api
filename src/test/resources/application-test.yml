server:
  port: 0

spring:
  application:
    name: oasis-api-test

  # Datasource is configured by TestcontainersConfig via @ServiceConnection.
  # Liquibase then runs on that container automatically.
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # Fictitious SMTP host — real mail sending is replaced by a no-op bean in tests.
  mail:
    host: localhost.invalid
    port: 1025

app:
  auth:
    jwt:
      secret: test-secret-test-secret-test-secret-test-secret-test-secret-12345
      access-ttl-seconds: 900
      refresh-ttl-seconds: 604800
    cookie:
      secure: false
      same-site: Lax
      domain: ""
  frontend:
    base-url: http://localhost:5173
  api:
    base-url: http://localhost:8080
  mail:
    from: noreply@oasis.local
    from-name: Oasis

logging:
  level:
    com.oasis: INFO
    org.springframework: WARN
    liquibase: WARN
    org.testcontainers: WARN
    com.github.dockerjava: WARN
    org.hibernate.SQL: WARN

server:
  port: ${PORT:8080}

spring:
  application:
    name: oasis-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:oasisdb_bph7}
    username: ${DB_USER:oasisdbuser}
    password: ${DB_PASSWORD:oasisdbpassword}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

app:
  auth:
    jwt:
      secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me-64bytes!!}
      access-ttl-seconds: 900
      refresh-ttl-seconds: 604800
    cookie:
      secure: ${COOKIE_SECURE:false}
      same-site: ${COOKIE_SAMESITE:Lax}
      domain: ${COOKIE_DOMAIN:}
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}
  api:
    base-url: ${API_BASE_URL:http://localhost:8080}
  mail:
    from: ${MAIL_FROM:noreply@oasis.local}
    from-name: ${MAIL_FROM_NAME:Oasis}

logging:
  level:
    com.oasis: INFO
    org.springframework: INFO